name: Deploy Main

on:
  push:
    branches:
      - main
    paths:
      - 'main/**'
      - '.github/workflows/deploy-main.yml'
  workflow_dispatch:

jobs:
  deploy-main:
    name: Deploy Main via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './main/package-lock.json'

      - name: Install Dependencies
        working-directory: ./main
        run: npm install

      - name: Build Project
        working-directory: ./main
        run: npm run build
        env:
          VITE_API_URL: https://api.hechizohookah.online/api

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: "161.97.169.203"
          username: "admin_main"
          password: "ktzcC5^8!6qedb8J"
          local-dir: ./main/dist/
    
